<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>学习日志笔记本</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📓</text></svg>" />
  <style>
    :root {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --primary: #4f46e5;
      --primary-soft: #eef2ff;
      --bg: #f4f4f5;
      --border: #e4e4e7;
      --text-main: #18181b;
      --text-sub: #71717a;
      --danger: #ef4444;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: radial-gradient(circle at top left, #eef2ff 0, #f4f4f5 45%, #fafafa 100%);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    .app {
      max-width: 1200px;
      width: 100%;
      height: 100vh;
      margin: 0 auto;
      padding: 16px 24px 12px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    header h1 {
      font-size: 26px;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header h1 span.logo-dot {
      width: 13px;
      height: 13px;
      border-radius: 999px;
      background: var(--primary);
      display: inline-block;
    }

    header .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    header label {
      font-size: 15px;
      color: var(--text-sub);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    input[type="date"] {
      padding: 6px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 15px;
      background: white;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 8px 18px;
      font-size: 14px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s, border-color 0.15s, box-shadow 0.15s, opacity 0.15s;
    }

    button.primary {
      background: var(--primary);
      color: white;
    }
    button.primary:hover {
      background: #4338ca;
      box-shadow: 0 2px 8px rgba(79, 70, 229, 0.35);
    }
    button.primary:active {
      opacity: 0.85;
    }

    button.outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-sub);
    }
    button.outline:hover {
      border-color: var(--primary);
      color: var(--primary);
    }
    button.outline:active {
      opacity: 0.8;
    }

    button.small {
      padding: 5px 12px;
      font-size: 13px;
    }

    main {
      display: flex;
      gap: 0;
      align-items: stretch;
      flex: 1;
      min-height: 0;
    }

    .pane-left,
    .pane-right {
      flex-shrink: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* 最小宽度保证 h2 标题行不换行 */
    .pane-left {
      flex: 1.2;
      min-width: 310px;
    }

    .pane-right {
      flex: 1;
      min-width: 250px;
    }

    .resize-handle {
      width: 14px;
      flex-shrink: 0;
      cursor: col-resize;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      user-select: none;
    }

    .resize-handle::after {
      content: '';
      width: 3px;
      height: 44px;
      background: var(--border);
      border-radius: 3px;
      transition: background 0.2s, transform 0.2s;
    }

    .resize-handle:hover::after,
    .resize-handle.dragging::after {
      background: var(--primary);
      transform: scaleX(1.5);
    }

    @media (max-width: 800px) {
      main {
        flex-direction: column;
      }

      .pane-left,
      .pane-right {
        width: 100% !important;
        flex: none !important;
      }

      .resize-handle {
        display: none;
      }
    }

    .card {
      background: rgba(255, 255, 255, 0.9);
      border-radius: 16px;
      border: 1px solid rgba(228, 228, 231, 0.9);
      padding: 16px 22px 14px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.05);
      backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--text-main);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .card h2 span.sub {
      font-size: 14px;
      color: var(--text-sub);
      font-weight: normal;
    }

    .editor-wrap {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    .fmt-bar {
      display: flex;
      align-items: center;
      gap: 1px;
      padding: 0 8px;
      max-height: 0;
      overflow: hidden;
      background: #f5f6ff;
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: 12px 12px 0 0;
      opacity: 0;
      pointer-events: none;
      transition: max-height 0.16s ease, opacity 0.14s ease, padding 0.16s ease;
      flex-shrink: 0;
    }

    .editor-wrap.focused .fmt-bar {
      max-height: 42px;
      padding: 5px 8px;
      opacity: 1;
      pointer-events: all;
    }

    .editor-wrap.focused .note-editor {
      border-top-left-radius: 0;
      border-top-right-radius: 0;
    }

    .fmt-btn {
      background: none;
      border: none;
      border-radius: 6px;
      width: 28px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-sub);
      font-size: 14px;
      font-family: inherit;
      padding: 0;
      transition: background 0.12s, color 0.12s;
      flex-shrink: 0;
    }

    .fmt-btn:hover {
      background: rgba(79, 70, 229, 0.1);
      color: var(--primary);
    }

    .fmt-btn:active {
      background: rgba(79, 70, 229, 0.2);
    }

    .fmt-btn.active {
      background: rgba(79, 70, 229, 0.12);
      color: var(--primary);
    }

    .fmt-sep {
      width: 1px;
      height: 16px;
      background: var(--border);
      margin: 0 4px;
      flex-shrink: 0;
    }

    .fmt-label {
      font-size: 11px;
      color: var(--text-sub);
      padding: 0 6px 0 4px;
      user-select: none;
    }

    /* ── contenteditable 编辑器 ── */
    .note-editor {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 10px 12px;
      font-size: 16px;
      line-height: 1.6;
      font-family: inherit;
      box-sizing: border-box;
      outline: none;
      color: var(--text-main);
      word-break: break-word;
      white-space: pre-wrap;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .note-editor:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 1px rgba(79, 70, 229, 0.2);
    }

    /* Placeholder */
    .note-editor:empty::before {
      content: attr(data-placeholder);
      color: var(--text-sub);
      opacity: 0.55;
      pointer-events: none;
      white-space: pre-line;
    }

    /* 编辑器内富文本样式 */
    .note-editor strong { font-weight: 600; }
    .note-editor em     { font-style: italic; }
    .note-editor code   {
      font-family: "Menlo", "Consolas", monospace;
      font-size: 0.88em;
      background: #f1f5f9;
      border-radius: 3px;
      padding: 0 3px;
    }

    input[type="date"]:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 1px rgba(79, 70, 229, 0.2);
    }

    /* note 卡片正文中的富文本渲染 */
    .note-body strong { font-weight: 600; color: var(--text-main); }
    .note-body em     { font-style: italic; color: var(--text-sub); }
    .note-body code   {
      font-family: "Menlo", "Consolas", monospace;
      font-size: 0.88em;
      background: #f1f5f9;
      border-radius: 3px;
      padding: 0 3px;
    }

    .card-footer {
      margin-top: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .hint {
      font-size: 13px;
      color: var(--text-sub);
    }

    .hint code {
      background: var(--bg);
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 12px;
    }

    .section {
      margin-top: 12px;
      flex-shrink: 0;
    }

    /* 右侧最后一个 section（笔记列表）撑满剩余高度 */
    .pane-right .section:last-child {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    .section-title {
      font-size: 14px;
      color: var(--text-sub);
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .sort-select {
      font-size: 12px;
      color: var(--text-sub);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2px 6px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.15s, color 0.15s;
      font-family: inherit;
    }
    .sort-select:hover, .sort-select:focus {
      border-color: var(--primary);
      color: var(--primary);
    }

    .tags-container,
    .note-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag-chip {
      font-size: 13px;
      padding: 4px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: white;
      color: var(--text-sub);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: border-color 0.15s, color 0.15s, opacity 0.15s;
    }

    .tag-chip:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .tag-chip:active {
      opacity: 0.75;
    }

    .tag-chip.active {
      background: var(--primary-soft);
      border-color: var(--primary);
      color: var(--primary);
      font-weight: 500;
    }

    .tag-chip.active:hover {
      border-color: #4338ca;
      color: #4338ca;
    }

    .tag-chip span.count {
      font-size: 12px;
      opacity: 0.7;
    }

    .tag-chip.unused {
      opacity: 0.45;
    }

    .tag-chip.unused:hover {
      opacity: 1;
    }

    .note-list {
      margin-top: 6px;
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding-right: 4px;
    }

    #titleInput {
      width: 100%;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 15px;
      font-weight: 600;
      background: white;
      margin-bottom: 8px;
      outline: none;
      flex-shrink: 0;
      box-sizing: border-box;
    }

    #titleInput:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79,70,229,.1);
    }

    .note-item {
      border-radius: 12px;
      border: 1px solid #e4e4e7;
      padding: 10px 14px;
      margin-bottom: 10px;
      background: #fdfdfd;
      display: flex;
      flex-direction: column;
      gap: 6px;
      cursor: pointer;
      transition: border-color .15s, box-shadow .15s;
    }

    .note-item:hover {
      border-color: #c7d2fe;
      box-shadow: 0 2px 8px rgba(79,70,229,.07);
    }

    .note-item.editing {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79,70,229,.12);
      background: #f5f3ff;
    }

    .note-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-main);
      line-height: 1.3;
    }

    .note-date {
      font-size: 12px;
      color: var(--text-sub);
      font-weight: 500;
    }

    .note-body {
      font-size: 15px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .note-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 2px;
    }

    .note-time {
      font-size: 11px;
      color: var(--text-sub);
      margin-left: auto;
    }

    .note-tags {
      margin-top: 2px;
    }

    .note-tags .tag-chip {
      cursor: pointer;
      border-radius: 999px;
      background: var(--primary-soft);
      border-color: transparent;
      color: var(--primary);
      font-size: 12px;
      transition: background 0.15s, border-color 0.15s, transform 0.12s;
    }

    .note-tags .tag-chip:hover {
      background: #ddd6fe;
      border-color: var(--primary);
      transform: translateY(-1px);
    }

    .note-tags .tag-chip:active {
      transform: translateY(0);
      opacity: 0.8;
    }

    .note-empty {
      font-size: 14px;
      color: var(--text-sub);
      padding: 16px 4px;
      text-align: center;
    }

    .ctx-menu {
      position: fixed;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,.12);
      padding: 4px 0;
      z-index: 9999;
      min-width: 130px;
      user-select: none;
    }

    .ctx-menu-item {
      padding: 9px 16px;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-main);
      transition: background .1s;
    }

    .ctx-menu-item:hover {
      background: var(--bg);
    }

    .ctx-menu-item.danger {
      color: var(--danger);
    }

    .filter-info {
      font-size: 13px;
      color: var(--text-sub);
    }

    .danger-link {
      font-size: 12px;
      color: var(--danger);
      cursor: pointer;
      text-decoration: underline;
      opacity: 0.7;
    }

    .sync-badge {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: background 0.3s, color 0.3s, border-color 0.3s;
      white-space: nowrap;
    }
    .sync-online  { background: #f0fdf4; color: #16a34a; border-color: #86efac; }
    .sync-offline { background: #fafafa; color: var(--text-sub); border-color: var(--border); }
    .sync-syncing { background: #eff6ff; color: #2563eb; border-color: #93c5fd; }
    .sync-error   { background: #fef2f2; color: var(--danger); border-color: #fca5a5; }

    /* --- 标签选择弹窗 --- */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.4);
      backdrop-filter: blur(5px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: fadeIn 0.15s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .modal-card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 24px 64px rgba(15, 23, 42, 0.18);
      width: 100%;
      max-width: 500px;
      padding: 26px 28px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      animation: slideUp 0.18s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(12px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .modal-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-main);
      margin: 0 0 4px;
    }

    .modal-preview {
      font-size: 13px;
      color: var(--text-sub);
      background: var(--bg);
      border-radius: 8px;
      padding: 8px 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.4;
    }

    .modal-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .modal-section-label {
      font-size: 12px;
      color: var(--text-sub);
      font-weight: 500;
    }

    .modal-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 30px;
    }

    .modal-tag {
      font-size: 13px;
      padding: 5px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: white;
      color: var(--text-sub);
      cursor: pointer;
      user-select: none;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
    }

    .modal-tag.selected {
      background: var(--primary-soft);
      border-color: var(--primary);
      color: var(--primary);
      font-weight: 500;
    }

    .modal-tag.custom {
      background: #f0fdf4;
      border-color: #86efac;
      color: #16a34a;
    }

    .modal-tag.custom.selected {
      background: #dcfce7;
      border-color: #4ade80;
      color: #15803d;
    }

    .modal-custom-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .modal-custom-row input {
      flex: 1;
      padding: 7px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .modal-custom-row input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.15);
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding-top: 6px;
      border-top: 1px solid var(--border);
    }

    .modal-empty-hint {
      font-size: 12px;
      color: var(--text-sub);
      font-style: italic;
    }

    /* ── 统一确认弹窗 ── */
    .confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.45);
      backdrop-filter: blur(5px);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: fadeIn 0.15s ease;
    }

    .confirm-card {
      background: white;
      border-radius: 18px;
      box-shadow: 0 24px 64px rgba(15, 23, 42, 0.2);
      width: 100%;
      max-width: 360px;
      padding: 28px 28px 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      animation: slideUp 0.18s ease;
    }

    .confirm-icon {
      font-size: 32px;
      line-height: 1;
    }

    .confirm-message {
      font-size: 15px;
      color: var(--text-main);
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .confirm-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding-top: 6px;
      border-top: 1px solid var(--border);
    }

    /* 危险操作按钮（红色）*/
    button.danger {
      background: #ef4444;
      color: white;
    }
    button.danger:hover {
      background: #dc2626;
      box-shadow: 0 2px 8px rgba(239, 68, 68, 0.35);
    }
    button.danger:active {
      opacity: 0.85;
    }

    /* ── 更新日志抽屉 ── */
    .changelog-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-sub);
      font-size: 13px;
      padding: 5px 12px;
      border-radius: 999px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: border-color 0.15s, color 0.15s;
    }
    .changelog-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    /* ── 图标按钮（右上角）── */
    .icon-btn {
      position: relative;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 32px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 15px;
      color: var(--text-sub);
      padding: 0;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      flex-shrink: 0;
    }
    .icon-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }
    .icon-btn:active { opacity: 0.75; }

    /* Tooltip */
    .icon-btn::after {
      content: attr(data-tooltip);
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      background: rgba(15,23,42,0.82);
      color: #fff;
      font-size: 12px;
      white-space: nowrap;
      padding: 4px 8px;
      border-radius: 6px;
      pointer-events: none;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 0.15s, transform 0.15s;
      z-index: 9999;
    }
    .icon-btn:hover::after {
      opacity: 1;
      transform: translateY(0);
    }

    .changelog-drawer {
      position: fixed;
      top: 0;
      right: 0;
      height: 100vh;
      width: 380px;
      max-width: 95vw;
      background: #fff;

<script>
  // --- 腾讯云开发 TCB SDK (2.24+ 认证 API) ---
  const tcbApp = cloudbase.init({
    env: "kt-notebook-5gzea6as40f0fb41",
    region: "ap-shanghai",
    auth: { detectSessionInUrl: true }
  });
  const tcbAuth = tcbApp.auth();
  const CLOUD_PATH     = "notes/notebook.json";
  const STORAGE_KEY    = "study_notes_v1";
  const FILE_ID_KEY    = "cloud_file_id_v1";
  const SYNC_FAIL_KEY  = "cloud_sync_failed_v1"; // 上次上传是否失败
  // 兜底 fileID：bucket 名称从控制台云存储列表确认为 6b74-kt-notebook-5gzea6as40f0fb41-1313442109
  const CLOUD_FILE_ID_DEFAULT = "cloud://kt-notebook-5gzea6as40f0fb41.6b74-kt-notebook-5gzea6as40f0fb41-1313442109/notes/notebook.json";

  /**
   * @typedef {Object} Note
   * @property {number}   id
   * @property {string}   date      YYYY-MM-DD（日期，用于分组/筛选）
   * @property {string}   datetime  YYYY-MM-DD HH:mm:ss（完整创建时间，人类可读）
   * @property {string}   text
   * @property {string[]} tags
   * @property {number}   createdAt 毫秒时间戳（用于排序和合并去重）
   */

  /** @type {Note[]} */
  let notes = [];
  /** 回收站：已软删除的笔记（含 trashedAt 时间戳） */
  let trash = [];
  /** 全局标签注册表：独立于 notes，删除某条笔记的 tag 时不会从此处移除 */
  let tagList = new Set();
  let activeTag = null;

  /** 将当前 notes + tagList + trash 序列化为 JSON 字符串 */
  function serializeData() {
    return JSON.stringify({ notes, tags: [...tagList], trash });
  }

  // --- 统一确认弹窗 ---
  (function () {
    const overlay    = document.getElementById("confirmModal");
    const msgEl      = document.getElementById("confirmMessage");
    const iconEl     = document.getElementById("confirmIcon");
    const okBtn      = document.getElementById("confirmOkBtn");
    const cancelBtn  = document.getElementById("confirmCancelBtn");
    let _cb = null;

    window.showConfirm = function (message, onConfirm, { okText = "确认", icon = "⚠️" } = {}) {
      msgEl.textContent    = message;
      iconEl.textContent   = icon;
      okBtn.textContent    = okText;
      _cb = onConfirm;
      overlay.style.display = "flex";
    };

    function hide() {
      overlay.style.display = "none";
      _cb = null;
    }

    okBtn.addEventListener("click", () => {
      const cb = _cb;
      hide();
      if (cb) cb();
    });
    cancelBtn.addEventListener("click", hide);
    overlay.addEventListener("click", (e) => { if (e.target === overlay) hide(); });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && overlay.style.display !== "none") { e.stopPropagation(); hide(); }
    }, true);
  })();

  // --- 工具函数 ---

  /**
   * 将存储的轻量 Markdown 渲染为安全 HTML（仅支持 **bold** / _italic_ / `code`）。
   * 先转义 HTML 实体，再替换格式标记，最后把换行转为 <br>。
   */
  function renderMarkdown(raw) {
    if (!raw) return "";
    return raw
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
      .replace(/`([^`]+)`/g,     "<code>$1</code>")
      .replace(/_([^_\n]+)_/g,   "<em>$1</em>")
      .replace(/\n/g, "<br>");
  }

  /**
   * 把 note.text 转为 HTML（兼容旧版 markdown 文本和新版 HTML 存储）。
   * 如果文本已包含 HTML 格式标签，直接返回；否则走 markdown 渲染。
   */
  /** 把 note.text 中的 <div> 行结构规范化为 <br>（兼容 contenteditable 旧存档） */
  function normalizeHtmlLines(html) {
    return html
      .replace(/<div>/gi,  "<br>")
      .replace(/<\/div>/gi, "")
      .replace(/^<br>/i, "");   // 去掉开头多余的 <br>
  }

  function noteToHtml(text) {
    if (!text) return "";
    // 新格式：带 <!--html--> 标记，直接用 HTML（用户手打的 ** _ 等字符不会被 markdown 转义）
    if (text.startsWith("<!--html-->")) return normalizeHtmlLines(text.slice(11));
    // 兼容旧格式：含 HTML 标签的直接用
    if (/<(strong|em|code|br|div|b|i)\b/.test(text)) return normalizeHtmlLines(text);
    // 最旧格式：纯 markdown 文本，走渲染
    return renderMarkdown(text);
  }

  /** 把 note.text 转为纯文本（用于 autoTitle、字数、搜索等场景） */
  function noteToPlain(text) {
    if (!text) return "";
    // 剥离 <!--html--> 标记，取出真正的 HTML 内容
    const raw = text.startsWith("<!--html-->") ? text.slice(11) : text;
    if (/<(strong|em|code|br|div|b|i)\b/.test(raw)) {
      const d = document.createElement("div");
      d.innerHTML = normalizeHtmlLines(raw);
      d.querySelectorAll("br").forEach(br => br.replaceWith("\n"));
      return d.textContent;
    }
    return raw;
  }

  /* ─────────── contenteditable 工具函数 ─────────── */

  /** 从编辑器 innerHTML 提取纯文本（<br>/<div> → \n，剥离其他标签） */
  function getEditorText() {
    const clone = noteInput.cloneNode(true);
    // <div> 表示换行（Chrome contenteditable 会产生 div）
    clone.querySelectorAll("div").forEach(div => {
      div.parentNode.insertBefore(document.createTextNode("\n"), div);
    });
    clone.querySelectorAll("br").forEach(br => br.replaceWith("\n"));
    return clone.textContent;
  }

  /** 把 markdown / HTML 文本设置为编辑器内容 */
  function setEditorContent(text) {
    noteInput.innerHTML = text ? noteToHtml(text) : "";
  }

  /** 把编辑器 HTML 转换回 markdown 纯文本（用于存储） */
  function editorToMarkdown() {
    const html = noteInput.innerHTML;
    if (!html) return "";
    return html
      .replace(/<strong>([\s\S]*?)<\/strong>/gi, "**$1**")
      .replace(/<b>([\s\S]*?)<\/b>/gi,           "**$1**")
      .replace(/<em>([\s\S]*?)<\/em>/gi,          "_$1_")
      .replace(/<i>([\s\S]*?)<\/i>/gi,            "_$1_")
      .replace(/<code>([\s\S]*?)<\/code>/gi,       "`$1`")
      .replace(/<br\s*\/?>/gi, "\n")
      // <div>…</div> → \n… （Chrome contenteditable 换行结构）
      .replace(/<div>/gi,  "\n")
      .replace(/<\/div>/gi, "")
      .replace(/<[^>]+>/g, "")
      .replace(/&amp;/g, "&").replace(/&lt;/g, "<")
      .replace(/&gt;/g, ">").replace(/&nbsp;/g, " ")
      .replace(/\n{2,}/g, "\n")   // 合并多余空行
      .trim();
  }

  /** 计算 DOM 节点 + 偏移在纯文本中的字符位置 */
  function charOffset(targetNode, targetOffset) {
    let count = 0;
    function walk(node) {
      if (node === targetNode) {
        if (node.nodeType === Node.TEXT_NODE) {
          count += targetOffset;
        } else {
          let i = 0;
          for (const child of node.childNodes) {
            if (i >= targetOffset) break;
            count += countNodeChars(child);
            i++;
          }
        }
        return true;
      }
      if (node.nodeType === Node.TEXT_NODE) { count += node.length; return false; }
      if (node.nodeName === "BR")           { count += 1;           return false; }
      // <div> 相当于一个换行前缀
      const isDiv = node.nodeName === "DIV" && node !== noteInput;
      if (isDiv) count += 1;
      for (const child of node.childNodes) { if (walk(child)) return true; }
      return false;
    }
    walk(noteInput);
    return count;
  }

  function countNodeChars(node) {
    if (!node) return 0;
    if (node.nodeType === Node.TEXT_NODE) return node.length;
    if (node.nodeName === "BR")  return 1;
    if (node.nodeName === "DIV") return 1 + Array.from(node.childNodes).reduce((s, c) => s + countNodeChars(c), 0);
    let t = 0;
    for (const c of node.childNodes) t += countNodeChars(c);
    return t;
  }

  function getCESelStart() {
    const sel = window.getSelection();
    if (!sel.rangeCount) return 0;
    const r = sel.getRangeAt(0);
    return charOffset(r.startContainer, r.startOffset);
  }

  function getCESelEnd() {
    const sel = window.getSelection();
    if (!sel.rangeCount) return 0;
    const r = sel.getRangeAt(0);
    return charOffset(r.endContainer, r.endOffset);
  }

  /** 从纯文本偏移量找到对应的 DOM 节点 + 内部偏移 */
  function findNodeOffset(targetOffset) {
    let count = 0;
    function walk(node) {
      if (node.nodeType === Node.TEXT_NODE) {
        if (count + node.length >= targetOffset) return [node, targetOffset - count];
        count += node.length; return null;
      }
      if (node.nodeName === "BR") {
        if (count + 1 >= targetOffset) {
          const idx = Array.from(node.parentNode.childNodes).indexOf(node) + 1;
          return [node.parentNode, idx];
        }
        count += 1; return null;
      }
      for (const child of node.childNodes) {
        const r = walk(child);
        if (r) return r;
      }
      return null;
    }
    return walk(noteInput) || [noteInput, noteInput.childNodes.length];
  }

  function setCESelection(start, end) {
    try {
      const [sNode, sOff] = findNodeOffset(start);
      const [eNode, eOff] = findNodeOffset(end);
      const range = document.createRange();
      range.setStart(sNode, sOff);
      range.setEnd(eNode, eOff);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    } catch (e) { /* 光标恢复失败时忽略 */ }
  }

  /**
   * 从纯文本重建编辑器内容，尽量保留内联格式。
   * 只有 line prefix 变化时（Tab/编号重排），直接修改对应文本节点，
   * 其余情况才整行重建（会丢失该行内联格式，但属极少数边界场景）。
   */
  function setEditorFromPlain(newText) {
    const oldLines = getEditorText().split("\n");
    const newLines = newText.split("\n");

    if (newLines.length !== oldLines.length) {
      // 行数变化：整体重建
      noteInput.innerHTML = renderMarkdown(newText);
      return;
    }

    for (let i = 0; i < newLines.length; i++) {
      if (newLines[i] === oldLines[i]) continue;
      const oldPl = prefixLength(oldLines[i] || "");
      const newPl = prefixLength(newLines[i] || "");
      // 前缀以外内容相同 → 只改首个文本节点的前缀部分
      if ((newLines[i] || "").slice(newPl) === (oldLines[i] || "").slice(oldPl)) {
        const tn = getLineFirstTextNode(i);
        if (tn) { tn.textContent = newLines[i].slice(0, newPl) + tn.textContent.slice(oldPl); continue; }
      }
      // 整行重建（丢弃内联格式）
      rebuildLine(i, newLines[i] || "");
    }
  }

  function prefixLength(line) {
    const level   = lineLevel(line);
    const trimmed = line.trimStart();
    const m       = trimmed.match(PREFIX_RE);
    return level * INDENT.length + (m ? m[0].length : 0);
  }

  /** 获取第 lineIdx 行第一个文本节点 */
  function getLineFirstTextNode(lineIdx) {
    let line = 0;
    for (const child of noteInput.childNodes) {
      if (child.nodeName === "BR") { line++; continue; }
      if (line === lineIdx) {
        if (child.nodeType === Node.TEXT_NODE) return child;
        return findFirstTextNode(child);
      }
    }
    return null;
  }

  function findFirstTextNode(node) {
    if (node.nodeType === Node.TEXT_NODE) return node;
    for (const c of node.childNodes) { const r = findFirstTextNode(c); if (r) return r; }
    return null;
  }

  /** 整行重建（最后手段，可能丢失该行内联格式） */
  function rebuildLine(lineIdx, newPlain) {
    const tn = getLineFirstTextNode(lineIdx);
    if (!tn) return;
    tn.textContent = newPlain;
    // 删除该行后续所有内联节点直到 <br>
    let next = tn.nextSibling;
    while (next && next.nodeName !== "BR") {
      const del = next; next = next.nextSibling; del.remove();
    }
  }

  /** 对选区应用格式（bold/italic/code） */
  function applyFormat(type) {
    noteInput.focus();
    if (typeof pushSnapshotNow === "function") pushSnapshotNow();
    if (type === "bold")   { document.execCommand("bold",   false, null); }
    else if (type === "italic") { document.execCommand("italic", false, null); }
    else if (type === "code") {
      const sel = window.getSelection();
      if (!sel.rangeCount) return;
      const range = sel.getRangeAt(0);
      if (range.collapsed) {
        // 无选区：插入空 code 元素并将光标移入
        const code = document.createElement("code");
        code.textContent = "\u200b"; // 零宽空格占位
        range.insertNode(code);
        const nr = document.createRange();
        nr.selectNodeContents(code);
        nr.collapse(false);
        sel.removeAllRanges(); sel.addRange(nr);
      } else {
        const text = range.toString();
        const code = document.createElement("code");
        code.textContent = text;
        range.deleteContents();
        range.insertNode(code);
        const nr = document.createRange();
        nr.setStartAfter(code); nr.collapse(true);
        sel.removeAllRanges(); sel.addRange(nr);
      }
    }
    noteInput.dispatchEvent(new Event("input"));
  }

  function getTodayStr() {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${day}`;
  }

  /** 将任意 Date 对象格式化为 "YYYY-MM-DD HH:mm:ss" */
  function formatDatetime(d) {
    const y  = d.getFullYear();
    const mo = String(d.getMonth() + 1).padStart(2, "0");
    const da = String(d.getDate()).padStart(2, "0");
    const h  = String(d.getHours()).padStart(2, "0");
    const mi = String(d.getMinutes()).padStart(2, "0");
    const s  = String(d.getSeconds()).padStart(2, "0");
    return `${y}-${mo}-${da} ${h}:${mi}:${s}`;
  }

  function setSyncBadge(state) {
    const el = document.getElementById("syncBadge");
    if (!el) return;
    const map = {
      online:  { text: "● 已同步",  cls: "sync-online"  },
      offline: { text: "○ 离线",    cls: "sync-offline" },
      syncing: { text: "↑ 同步中…", cls: "sync-syncing" },
      error:   { text: "✕ 同步失败", cls: "sync-error"  },
    };
    const s = map[state] || map.offline;
    el.textContent = s.text;
    el.className   = "sync-badge " + s.cls;
  }

  async function saveNotes() {
    localStorage.setItem(STORAGE_KEY, serializeData());
    setSyncBadge("syncing");
    try {
      const blob = new Blob([serializeData()], { type: "application/json" });
      const file = new File([blob], "notebook.json", { type: "application/json" });
      const uploadRes = await tcbApp.uploadFile({ cloudPath: CLOUD_PATH, filePath: file });
      if (uploadRes?.fileID) {
        localStorage.setItem(FILE_ID_KEY, uploadRes.fileID);
        console.log("[Storage] 上传成功，fileID:", uploadRes.fileID);
      }
      localStorage.removeItem(SYNC_FAIL_KEY); // 上传成功：清除失败标记
      setSyncBadge("online");
    } catch (err) {
      console.error("[Storage] 云存储写入失败：", err);
      localStorage.setItem(SYNC_FAIL_KEY, "1"); // 记录失败，下次加载时合并本地数据
      setSyncBadge("error");
    }
  }

  function loadNotesFromLocal() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) { notes = []; trash = []; tagList = new Set(); return; }
      const parsed = JSON.parse(raw);
      if (Array.isArray(parsed)) {
        // 旧格式（仅 notes 数组），从 notes 中推导 tagList
        notes = parsed;
        trash = [];
        tagList = new Set(notes.flatMap(n => n.tags || []));
      } else {
        notes   = Array.isArray(parsed.notes) ? parsed.notes : [];
        trash   = Array.isArray(parsed.trash) ? parsed.trash : [];
        tagList = new Set(Array.isArray(parsed.tags) ? parsed.tags : []);
        // 确保 notes 里的 tag 也全部收录（防止旧数据缺失）
        for (const n of notes) for (const t of (n.tags || [])) tagList.add(t);
      }
    } catch (e) { notes = []; trash = []; tagList = new Set(); }
  }

  /**
   * 合并云端与本地笔记（按 id 去重，同 id 取 createdAt 更新的），避免直接覆盖导致丢数据
   * @param {Note[]} cloudNotes 云端数据
   * @param {Note[]} localNotes 本地数据
   * @returns {Note[]} 合并后的列表，按 createdAt 排序
   */
  function mergeNotes(cloudNotes, localNotes) {
    const byId = new Map();
    const add = (list) => {
      if (!Array.isArray(list)) return;
      for (const n of list) {
        if (!n || n.id == null) continue;
        const existing = byId.get(n.id);
        const created = n.createdAt != null ? n.createdAt : 0;
        if (!existing || (existing.createdAt != null && created > existing.createdAt)) {
          byId.set(n.id, n);
        }
      }
    };
    add(cloudNotes);
    add(localNotes);
    return Array.from(byId.values()).sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
  }

  // 获取当前所有已有标签（直接返回全局注册表）
  function getAllExistingTags() {
    return [...tagList];
  }

  // 简单的标签提取：#标签 + 高频英文单词 + 文本中出现的已有标签
  function extractTagsFromText(text, existingTags = []) {
    const tagsSet = new Set();

    // 1) 识别 #标签
    const hashTagRegex = /#([\p{L}\d_]{1,20})/gu;
    let match;
    while ((match = hashTagRegex.exec(text)) !== null) {
      tagsSet.add(match[1]);
    }

    // 2) 文本中出现的已有标签
    const lowerText = text.toLowerCase();
    for (const tag of existingTags) {
      if (!tag) continue;
      if (lowerText.includes(tag.toLowerCase())) {
        tagsSet.add(tag);
      }
    }

    return Array.from(tagsSet);
  }

  // --- DOM 引用 ---
  const dateInput = document.getElementById("dateInput");
  const noteInput = document.getElementById("noteInput");
  const titleInput    = document.getElementById("titleInput");
  const saveBtn       = document.getElementById("saveBtn");
  const cancelEditBtn = document.getElementById("cancelEditBtn");

  // --- 格式化工具栏 ---
  const editorWrap = document.getElementById("editorWrap");
  const fmtBar     = document.getElementById("fmtBar");

  noteInput.addEventListener("focus", () => editorWrap.classList.add("focused"));
  noteInput.addEventListener("blur", (e) => {
    // 点击格式条按钮时 relatedTarget 是 fmt-btn，此时不收起工具栏
    if (fmtBar && fmtBar.contains(e.relatedTarget)) return;
    editorWrap.classList.remove("focused");
  });

  fmtBar.querySelectorAll(".fmt-btn[data-fmt]").forEach(btn => {
    btn.addEventListener("mousedown", (e) => {
      e.preventDefault(); // 阻止 textarea 失焦
      applyFormat(btn.dataset.fmt);
    });
  });

  // ── 自定义 Undo 历史栈 ──────────────────────────────────────────
  const UNDO_MAX = 200;
  let undoStack   = [];   // [{ html, selStart, selEnd }, ...]
  let undoPointer = -1;   // 指向当前状态
  let undoPushTimer = null;
  let undoApplying  = false; // 正在还原时屏蔽 input 触发

  const undoBtn = document.getElementById("undoBtn");
  const redoBtn = document.getElementById("redoBtn");

  function updateHistoryBtns() {
    const canUndo = undoPointer > 0;
    const canRedo = undoPointer < undoStack.length - 1;
    undoBtn.disabled = !canUndo;
    undoBtn.style.opacity = canUndo ? "1" : "0.35";
    redoBtn.disabled = !canRedo;
    redoBtn.style.opacity = canRedo ? "1" : "0.35";
  }

  /** 将当前编辑器状态压入历史栈 */
  function pushUndoSnapshot() {
    if (undoApplying) return;
    const html = noteInput.innerHTML;
    // 与栈顶相同则不重复压入
    if (undoPointer >= 0 && undoStack[undoPointer].html === html) return;
    // 截断重做分支
    undoStack = undoStack.slice(0, undoPointer + 1);
    undoStack.push({ html, sel: getCESelStart() });
    if (undoStack.length > UNDO_MAX) undoStack.shift();
    undoPointer = undoStack.length - 1;
    updateHistoryBtns();
  }

  /** 防抖：输入时每 400ms 或操作间隔触发一次快照 */
  function schedulePushSnapshot() {
    clearTimeout(undoPushTimer);
    undoPushTimer = setTimeout(pushUndoSnapshot, 400);
  }

  /** 立即压入快照（格式操作等明确的状态改变时调用） */
  function pushSnapshotNow() {
    clearTimeout(undoPushTimer);
    pushUndoSnapshot();
  }

  /** 执行撤回 */
  function performUndo() {
    if (undoPointer <= 0) return;
    // 先确保当前状态已入栈
    if (undoPushTimer) { clearTimeout(undoPushTimer); pushUndoSnapshot(); }
    undoPointer--;
    const snap = undoStack[undoPointer];
    undoApplying = true;
    noteInput.innerHTML = snap.html;
    // 恢复光标到快照位置
    try { setCESelection(snap.sel, snap.sel); } catch(_) {}
    noteInput.dispatchEvent(new Event("input"));
    undoApplying = false;
    updateHistoryBtns();
  }

  /** 执行重做 */
  function performRedo() {
    if (undoPointer >= undoStack.length - 1) return;
    undoPointer++;
    const snap = undoStack[undoPointer];
    undoApplying = true;
    noteInput.innerHTML = snap.html;
    try { setCESelection(snap.sel, snap.sel); } catch(_) {}
    noteInput.dispatchEvent(new Event("input"));
    undoApplying = false;
    updateHistoryBtns();
  }

  // 编辑器 input 时安排快照
  noteInput.addEventListener("input", schedulePushSnapshot);

  // 编辑器首次获焦时压入初始快照
  noteInput.addEventListener("focus", () => {
    if (undoPointer === -1) pushUndoSnapshot();
  }, { once: false });

  // 撤回 / 重做按钮点击
  undoBtn.addEventListener("mousedown", (e) => { e.preventDefault(); performUndo(); });
  redoBtn.addEventListener("mousedown", (e) => { e.preventDefault(); performRedo(); });

  // ─────────────────────────────────────────────────────────────────

  // --- 编辑状态 ---
  let editingNoteId = null;

  function resetUndoStack() {
    clearTimeout(undoPushTimer);
    undoStack   = [];
    undoPointer = -1;
    if (undoBtn) { undoBtn.disabled = true; undoBtn.style.opacity = "0.35"; }
    if (redoBtn) { redoBtn.disabled = true; redoBtn.style.opacity = "0.35"; }
  }

  function enterEditMode(note) {
    editingNoteId = note.id;
    titleInput.value = note.title || "";
    setEditorContent(note.text);
    dateInput.value  = note.date;
    charCount.textContent = `${getEditorText().length} 字`;
    saveBtn.textContent = "更新日志";
    cancelEditBtn.style.display = "";
    resetUndoStack();
    // 滚到编辑区
    document.getElementById("paneLeft").scrollIntoView({ behavior: "smooth", block: "start" });
    titleInput.focus();
    renderNotes(); // 刷新高亮
  }

  function exitEditMode() {
    editingNoteId = null;
    titleInput.value = "";
    noteInput.innerHTML = "";
    dateInput.value  = getTodayStr();
    charCount.textContent = "0 字";
    saveBtn.textContent = "保存日志";
    cancelEditBtn.style.display = "none";
    resetUndoStack();
    renderNotes();
  }

  cancelEditBtn.addEventListener("click", exitEditMode);
  const todayBtn = document.getElementById("todayBtn");
  const charCount = document.getElementById("charCount");
  const tagListEl = document.getElementById("tagList");
  const noteListEl = document.getElementById("noteList");
  const noteSummaryEl = document.getElementById("noteSummary");
  const filterInfoEl = document.getElementById("filterInfo");
  const clearAllBtn = document.getElementById("clearAllBtn");
  const sortSelect  = document.getElementById("sortSelect");

  // 排序方式：'updatedAt' | 'createdAt'
  let sortOrder = localStorage.getItem("sortOrder") || "updatedAt";

  // 初始化排序选择器
  sortSelect.value = sortOrder;
  sortSelect.addEventListener("change", () => {
    sortOrder = sortSelect.value;
    localStorage.setItem("sortOrder", sortOrder);
    renderNotes();
  });

  // 删除某个标签：从所有笔记中移除，并从全局 tagList 注销
  function deleteTagEverywhere(tagToDelete) {
    for (const note of notes) {
      if (Array.isArray(note.tags)) {
        note.tags = note.tags.filter((t) => t !== tagToDelete);
      }
    }
    tagList.delete(tagToDelete);
    saveNotes();
    if (activeTag === tagToDelete) activeTag = null;
    render();
  }

  // 给 tag 绑定事件：左键筛选，右键删除
  // tag 事件：用于左侧标签栏（右键 → 全局菜单）
  function attachTagEvents(tagElement, tag) {
    tagElement.addEventListener("click", (e) => {
      if (e.button !== 0) return;
      activeTag = activeTag === tag ? null : tag;
      render();
    });
    tagElement.addEventListener("contextmenu", (e) => {
      e.preventDefault();
      e.stopPropagation();
      showTagCtxMenu(e.clientX, e.clientY, tag);
    });
  }

  // tag 事件：用于笔记卡片内（右键 → 仅从本条删除菜单）
  function attachNoteTagEvents(tagElement, tag, noteId) {
    tagElement.addEventListener("click", (e) => {
      if (e.button !== 0) return;
      activeTag = activeTag === tag ? null : tag;
      render();
    });
    tagElement.addEventListener("contextmenu", (e) => {
      e.preventDefault();
      e.stopPropagation();
      showNoteTagCtxMenu(e.clientX, e.clientY, tag, noteId);
    });
  }

  // --- 渲染 ---
  function render() {
    renderSummary();
    renderTags();
    renderNotes();
    updateTrashBadge();
  }

  function renderSummary() {
    noteSummaryEl.textContent = `共 ${notes.length} 条笔记`;
    if (activeTag) {
      filterInfoEl.textContent = `按标签「${activeTag}」筛选中`;
    } else {
      filterInfoEl.textContent = "未筛选";
    }
  }

  function renderTags() {
    // 统计各 tag 在 notes 中的使用次数
    const tagCount = new Map();
    for (const n of notes) {
      for (const t of n.tags || []) {
        tagCount.set(t, (tagCount.get(t) || 0) + 1);
      }
    }
    // 确保 tagList 中的 tag 全部出现（即使 count 为 0）
    for (const t of tagList) {
      if (!tagCount.has(t)) tagCount.set(t, 0);
    }

    tagListEl.innerHTML = "";
    if (tagCount.size === 0) {
      const span = document.createElement("span");
      span.className = "hint";
      span.textContent = "暂无标签，写几条日志试试吧～";
      tagListEl.appendChild(span);
      return;
    }

    // 按使用次数降序，次数相同时按名称升序
    const sortedTags = [...tagCount.entries()].sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]));

    for (const [tag, count] of sortedTags) {
      const div = document.createElement("div");
      div.className = "tag-chip" + (activeTag === tag ? " active" : "") + (count === 0 ? " unused" : "");
      div.textContent = tag;

      const countSpan = document.createElement("span");
      countSpan.className = "count";
      countSpan.textContent = `×${count}`;
      div.appendChild(countSpan);

      attachTagEvents(div, tag);
      tagListEl.appendChild(div);
    }
  }

  // 自动生成标题：取正文第一行前5字，超出加...
  function autoTitle(text) {
    const plain     = noteToPlain(text);
    return plain.split("\n")[0].trim();
  }

  // --- 笔记右键菜单 ---
  const ctxMenu   = document.getElementById("ctxMenu");
  const ctxDelete = document.getElementById("ctxDelete");
  let ctxNoteId   = null;

  function showCtxMenu(x, y, noteId) {
    hideTagCtxMenu();
    ctxNoteId = noteId;
    ctxMenu.style.display = "block";
    const menuW = 140, menuH = 50;
    ctxMenu.style.left = (x + menuW > window.innerWidth  ? x - menuW : x) + "px";
    ctxMenu.style.top  = (y + menuH > window.innerHeight ? y - menuH : y) + "px";
  }

  function hideCtxMenu() {
    ctxMenu.style.display = "none";
    ctxNoteId = null;
  }

  // --- Tag 右键菜单 ---
  const tagCtxMenu    = document.getElementById("tagCtxMenu");
  const tagCtxFilter  = document.getElementById("tagCtxFilter");
  const tagCtxDeleteEl= document.getElementById("tagCtxDelete");
  let ctxTag = null;

  function showTagCtxMenu(x, y, tag) {
    hideCtxMenu();
    ctxTag = tag;
    // 动态更新筛选项文字，反映当前状态
    tagCtxFilter.textContent = activeTag === tag ? "🏷 取消筛选" : "🏷 筛选此标签";
    tagCtxMenu.style.display = "block";
    const menuW = 190, menuH = 80;
    tagCtxMenu.style.left = (x + menuW > window.innerWidth  ? x - menuW : x) + "px";
    tagCtxMenu.style.top  = (y + menuH > window.innerHeight ? y - menuH : y) + "px";
  }

  function hideTagCtxMenu() {
    tagCtxMenu.style.display = "none";
    ctxTag = null;
  }

  tagCtxFilter.addEventListener("click", () => {
    if (!ctxTag) return;

  ctxDelete.addEventListener("click", () => {

    notes = notes.filter(n => n.id !== id);

  function renderNotes() {
    noteListEl.innerHTML = "";
    let list = notes.slice();

    if (sortOrder === "createdAt") {
      list.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
    } else {

      list.sort((a, b) => (b.updatedAt || b.createdAt || 0) - (a.updatedAt || a.createdAt || 0));

    if (list.length === 0) {
      const empty = document.createElement("div");

    for (const note of list) {
      const item = document.createElement("div");

      // 右键菜单
      item.addEventListener("contextmenu", (e) => {
        e.preventDefault();

        showCtxMenu(e.clientX, e.clientY, note.id);

      // 左上角：有标题用标题，否则从正文自动生成
      const titleEl = document.createElement("div");
      titleEl.className = "note-title";
      titleEl.textContent = note.title || autoTitle(note.text);

      const body = document.createElement("div");
      body.className = "note-body";
      // 最多显示 5 行：超出时保留前 4 行，第 5 行显示省略号
      const plain = noteToPlain(note.text || "");
      const bodyLines = plain.split("\n");
      const displayPlain = bodyLines.length > 5
        ? bodyLines.slice(0, 4).join("\n") + "\n…"
        : plain;
      body.innerHTML = noteToHtml(displayPlain);

      item.appendChild(titleEl);
      item.appendChild(body);

      if (note.tags && note.tags.length > 0) {
        const tagContainer = document.createElement("div");
        tagContainer.className = "note-tags";

        for (const t of note.tags) {
          const tagEl = document.createElement("span");

      dateSpan.className = "note-date";

      timeSpan.className = "note-time";

      footer.appendChild(timeSpan);

      item.appendChild(footer);
      noteListEl.appendChild(item);

  }

  // --- 标签选择弹窗 ---
  const tagModalEl      = document.getElementById("tagModal");
  const modalPreviewEl  = document.getElementById("modalPreview");
  const modalAutoEl     = document.getElementById("modalAutoTags");
  const modalExistEl    = document.getElementById("modalExistingTags");
  const modalCustomEl   = document.getElementById("modalCustomTags");
  const modalCustomInput = document.getElementById("modalCustomInput");
  const modalAutoSection  = document.getElementById("modalAutoSection");
  const modalExistSection = document.getElementById("modalExistingSection");

  // 弹窗状态
  const modal = {
    pendingText: "",  // 纯文本（用于 tag 提取、显示）
    pendingHtml: "",  // HTML（用于存储，保留格式）
    pendingTitle: "",
    pendingDate: "",
    selectedSet: new Set(),
    customTags: [],
  };

  function renderModalTagList(container, tags, isCustom = false) {
    container.innerHTML = "";
    if (tags.length === 0) {
      const hint = document.createElement("span");
      hint.className = "modal-empty-hint";
      hint.textContent = "（无）";
      container.appendChild(hint);
      return;
    }
    for (const tag of tags) {
      const chip = document.createElement("span");
      chip.className = "modal-tag" + (isCustom ? " custom" : "") + (modal.selectedSet.has(tag) ? " selected" : "");
      chip.textContent = tag;
      chip.addEventListener("click", () => {
        if (modal.selectedSet.has(tag)) {
          modal.selectedSet.delete(tag);
        } else {
          modal.selectedSet.add(tag);
        }
        chip.classList.toggle("selected", modal.selectedSet.has(tag));
      });
      container.appendChild(chip);
    }
  }

  function openTagModal(text, date, title, preselectedTags) {
    modal.pendingText  = text;
    modal.pendingDate  = date;
    modal.pendingTitle = title || "";
    modal.customTags  = [];
    modal.selectedSet = new Set(preselectedTags || []);

    // 自动提取并预选
    const existingTags = getAllExistingTags();
    const autoTags     = extractTagsFromText(text, existingTags);
    autoTags.forEach(t => modal.selectedSet.add(t));

    // 已有标签中排除自动提取的
    const extraExisting = existingTags.filter(t => !autoTags.includes(t));

    modalPreviewEl.textContent = text.length > 80 ? text.slice(0, 80) + "…" : text;

    modalExistSection.style.display = extraExisting.length ? "" : "none";
    renderModalTagList(modalExistEl, extraExisting, false);

    modalCustomEl.innerHTML = "";
    modalCustomInput.value  = "";

    tagModalEl.style.display = "flex";
    setTimeout(() => modalCustomInput.focus(), 50);
  }

  function closeTagModal() {
    tagModalEl.style.display = "none";
    modal.pendingText  = "";
    modal.pendingHtml  = "";
    modal.pendingTitle = "";
    modal.pendingDate  = "";
  }

  function addCustomTag() {
    const val = modalCustomInput.value.trim();
    if (!val) return;
    if (modal.customTags.includes(val) || modal.selectedSet.has(val)) {
      modalCustomInput.value = "";
      return;
    }
    modal.customTags.push(val);
    modal.selectedSet.add(val);
    renderModalTagList(modalCustomEl, modal.customTags, true);
    modalCustomInput.value = "";
    modalCustomInput.focus();
  }

  document.getElementById("modalAddBtn").addEventListener("click", addCustomTag);

  modalCustomInput.addEventListener("keydown", (e) => {

  document.getElementById("modalConfirmBtn").addEventListener("click", () => {

    if (editingNoteId != null) {
      // 更新已有笔记
      const idx = notes.findIndex(n => n.id === editingNoteId);

        };

      exitEditMode();
    } else {

      saveNotes();

      noteInput.innerHTML = "";

  // --- 事件绑定 ---
  saveBtn.addEventListener("click", () => {
    const text  = getEditorText().trim();   // 纯文本，用于 tag 提取
    const date  = dateInput.value || getTodayStr();
    const title = titleInput.value.trim();

    if (!text) {
      alert("内容为空，先写点东西再保存吧～");
      return;
    }

    // 编辑时预选已有标签
    const preselected = editingNoteId != null
      ? (notes.find(n => n.id === editingNoteId)?.tags || [])
      : [];

    // 把当前 HTML 转回 markdown 存入 modal.pendingText（存储格式）
    modal.pendingHtml = "<!--html-->" + noteInput.innerHTML;
    openTagModal(text, date, title, preselected);
  });

  noteInput.addEventListener("input", () => {
    charCount.textContent = `${getEditorText().length} 字`;
  });

  // --- Tab 缩进 + 自动编号 / Shift+Tab 回退层级 / Backspace 回退缩进 ---
  const INDENT = "  "; // 2空格为一级缩进
  const PREFIX_RE = /^(\d+\. |[a-z]\. |- )/;

  function lineLevel(line) {
    const m = line.match(/^(\s*)/);
    return m ? Math.floor(m[1].length / INDENT.length) : 0;
  }

  function lineContent(line) {
    return line.replace(/^\s*/, "").replace(PREFIX_RE, "");
  }

  // 全局重新编号：按顺序扫描所有行，为每个编号行赋正确序号
  function renumberAll(text) {
    const lines = text.split("\n");
    const counters = {}; // level -> 当前计数
    return lines.map(line => {
      const level   = lineLevel(line);
      const trimmed = line.trimStart();
      // 遇到比当前 level 深的 counter 要清掉（进入新父条目时子级重新计数）
      for (const k in counters) {
        if (parseInt(k) > level) delete counters[k];
      }
      if (!PREFIX_RE.test(trimmed)) return line; // 非编号行保持不变
      const content = lineContent(line);
      counters[level] = (counters[level] || 0) + 1;
      const n = counters[level];
      let pre;
      if (level === 1) pre = `${n}. `;
      else if (level === 2) pre = `${String.fromCharCode(96 + n)}. `;
      else pre = "- ";
      return INDENT.repeat(level) + pre + content;
    }).join("\n");
  }

  // 应用新文本 + 全局重新编号，光标定位到指定行行首的正文起始处
  function applyRenumbered(ta, newVal, cursorPos) {
    const lineIdx    = (newVal.slice(0, cursorPos).match(/\n/g) || []).length;
    const renumbered = renumberAll(newVal);
    const newLines   = renumbered.split("\n");
    let pos = 0;
    for (let i = 0; i < lineIdx && i < newLines.length; i++) pos += newLines[i].length + 1;
    const tLine    = newLines[Math.min(lineIdx, newLines.length - 1)] || "";
    const tTrimmed = tLine.trimStart();
    const prefixLen = tLine.length - tTrimmed.length + (tTrimmed.match(PREFIX_RE) || [""])[0].length;
    pos += prefixLen;
    setEditorFromPlain(renumbered);
    setCESelection(pos, pos);
    charCount.textContent = `${renumbered.length} 字`;
  }

  // 临时前缀（用于在 renumberAll 修正前占位）
  function provPrefix(level) {
    if (level === 1) return "1. ";
    if (level === 2) return "a. ";
    if (level >= 3) return "- ";
    return "";
  }

  // 修改当前行的层级（Tab / Shift+Tab）
  function shiftLineLevel(delta) {
    const val        = getEditorText();
    const start      = getCESelStart();
    const lineStart  = val.lastIndexOf("\n", start - 1) + 1;
    const lineEndIdx = val.indexOf("\n", start);
    const lineStop   = lineEndIdx === -1 ? val.length : lineEndIdx;
    const line       = val.slice(lineStart, lineStop);
    const newLevel   = Math.max(0, lineLevel(line) + delta);
    const content    = lineContent(line);
    const newLine    = INDENT.repeat(newLevel) + provPrefix(newLevel) + content;
    const newVal     = val.slice(0, lineStart) + newLine + val.slice(lineStop);
    const cursorPos  = lineStart + newLine.length - content.length;
    applyRenumbered(null, newVal, cursorPos);
  }

  noteInput.addEventListener("keydown", (e) => {
    // CE 代理对象：让键盘处理逻辑可沿用纯文本 API
    const ta = {
      get value()          { return getEditorText(); },
      set value(v)         { setEditorFromPlain(v); },
      get selectionStart() { return getCESelStart(); },
      get selectionEnd()   { return getCESelEnd();   },
      setSelectionRange(s, end) { setCESelection(s, end); },
    };
    const start = ta.selectionStart;
    const end   = ta.selectionEnd;
    const val   = ta.value;

    // Ctrl/Cmd 快捷键
    if (e.ctrlKey || e.metaKey) {
      if (e.key === "z" && !e.shiftKey) { e.preventDefault(); performUndo(); return; }
      if (e.key === "z" &&  e.shiftKey) { e.preventDefault(); performRedo(); return; }
      if (e.key === "y"  && !e.shiftKey) { e.preventDefault(); performRedo(); return; }
      if (e.key === "b") { e.preventDefault(); pushSnapshotNow(); applyFormat("bold");   return; }
      if (e.key === "i") { e.preventDefault(); pushSnapshotNow(); applyFormat("italic"); return; }
      if (e.key === "`") { e.preventDefault(); pushSnapshotNow(); applyFormat("code");   return; }
    }

    // Shift+Tab：升一级
    if (e.key === "Tab" && e.shiftKey) {
      e.preventDefault();
      shiftLineLevel(-1);
      return;
    }

    // Tab：降一级
    if (e.key === "Tab" && !e.shiftKey) {
      e.preventDefault();
      if (start === end) {
        shiftLineLevel(+1);
      } else {
        // 多选时只加缩进，不改编号
        ta.value = val.slice(0, start) + INDENT + val.slice(start);
        ta.setSelectionRange(start + INDENT.length, end + INDENT.length);
        charCount.textContent = `${ta.value.length} 字`;
      }
      return;
    }

    // Enter：有编号时继续同级编号；否则插入 <br> 保持扁平结构
    if (e.key === "Enter") {
      e.preventDefault();
      const lineStart  = val.lastIndexOf("\n", start - 1) + 1;
      const lineEndIdx = val.indexOf("\n", start);
      const lineStop   = lineEndIdx === -1 ? val.length : lineEndIdx;
      const line       = val.slice(lineStart, lineStop);
      const level      = lineLevel(line);
      if (level > 0 && PREFIX_RE.test(line.trimStart())) {
        const content = lineContent(line);
        if (content.trim() === "") {
          // 空条目：上升一级（level 1 时彻底退出列表）
          const upLevel = Math.max(0, level - 1);
          const newLine = INDENT.repeat(upLevel) + provPrefix(upLevel);
          const newVal  = val.slice(0, lineStart) + newLine + val.slice(lineStop);
          applyRenumbered(ta, newVal, lineStart + newLine.length);
        } else {
          // 插入下一个同级占位条目，renumberAll 会修正序号
          const insertion = "\n" + INDENT.repeat(level) + provPrefix(level);
          const newVal    = val.slice(0, start) + insertion + val.slice(start);
          applyRenumbered(ta, newVal, start + insertion.length);
        }
        return;
      }
      // 普通换行：插入 <br> 使结构扁平，避免浏览器生成 <div>
      document.execCommand("insertLineBreak");
      return;
    }

    // Backspace：有两种情况
    if (e.key === "Backspace" && start === end) {
      const lineStart    = val.lastIndexOf("\n", start - 1) + 1;
      const lineEndIdx   = val.indexOf("\n", start);
      const lineStop     = lineEndIdx === -1 ? val.length : lineEndIdx;
      const line         = val.slice(lineStart, lineStop);
      const beforeCursor = val.slice(lineStart, start);
      const indentLen    = lineLevel(line) * INDENT.length;
      const prefixMatch  = line.trimStart().match(PREFIX_RE);

      // 情况A：光标恰在编号前缀末尾（indent + prefix 之后，内容之前）
      //        → 仅删除编号前缀，保留缩进和正文内容，然后重新编号
      if (prefixMatch && start === lineStart + indentLen + prefixMatch[0].length) {
        e.preventDefault();
        // 去掉当前行的 prefix（保留缩进 + 正文）
        const prefixLen  = prefixMatch[0].length;
        const newVal     = val.slice(0, lineStart + indentLen) + val.slice(lineStart + indentLen + prefixLen);
        const newCursorPos = lineStart + indentLen; // 光标停在（缩进之后、原正文起点）
        applyRenumbered(ta, newVal, newCursorPos);
        return;
      }

      // 情况B：光标前全是缩进空格时回退一级
      if (/^\s+$/.test(beforeCursor) && beforeCursor.length >= INDENT.length) {
        e.preventDefault();
        ta.value = val.slice(0, start - INDENT.length) + val.slice(start);
        ta.setSelectionRange(start - INDENT.length, start - INDENT.length);
        charCount.textContent = `${ta.value.length} 字`;
      }
    }
  });

  todayBtn.addEventListener("click", () => {
    dateInput.value = getTodayStr();
  });

  // ── 回收站 ────────────────────────────────────────────────────────

  function updateTrashBadge() {
    const badge = document.getElementById("trashBadge");
    if (!badge) return;
    if (trash.length > 0) {
      badge.textContent = trash.length > 99 ? "99+" : String(trash.length);
      badge.style.display = "";
    } else {
      badge.style.display = "none";
    }
  }

  function renderTrash() {
    const body = document.getElementById("trashBody");
    body.innerHTML = "";
    if (trash.length === 0) {
      const empty = document.createElement("div");
      empty.className = "trash-empty";
      empty.innerHTML = "🗑<br><br>回收站是空的";
      body.appendChild(empty);
      return;
    }
    const sorted = [...trash].sort((a, b) => (b.trashedAt || 0) - (a.trashedAt || 0));
    for (const note of sorted) {
      const item = document.createElement("div");
      item.className = "trash-item";

      const titleEl = document.createElement("div");
      titleEl.className = "trash-item-title";
      titleEl.textContent = note.title || autoTitle(note.text);

      const bodyEl = document.createElement("div");
      bodyEl.className = "trash-item-body";
      bodyEl.textContent = noteToPlain(note.text || "").replace(/\n+/g, " ").slice(0, 100);

      const meta = document.createElement("div");
      meta.className = "trash-item-meta";
      const trashedStr = note.trashedAt
        ? new Date(note.trashedAt).toLocaleString([], { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" })
        : "—";
      meta.textContent = "创建于 " + note.date + " · 删除于 " + trashedStr;

      const actions = document.createElement("div");
      actions.className = "trash-item-actions";

      const restoreBtn = document.createElement("button");
      restoreBtn.className = "outline small";
      restoreBtn.style.fontSize = "12px";
      restoreBtn.textContent = "↩ 恢复";
      restoreBtn.addEventListener("click", () => restoreFromTrash(note.id));

      const delBtn = document.createElement("button");
      delBtn.className = "btn-perm-delete";
      delBtn.textContent = "彻底删除";
      delBtn.addEventListener("click", () => {
        showConfirm(
          "彻底删除「" + (note.title || autoTitle(note.text)) + "」？\n此操作不可恢复。",
          () => { permanentDelete(note.id); },
          { okText: "彻底删除", icon: "🗑️" }
        );
      });

      actions.appendChild(restoreBtn);
      actions.appendChild(delBtn);
      item.append(titleEl, bodyEl, meta, actions);
      body.appendChild(item);
    }
  }

  function restoreFromTrash(id) {
    const note = trash.find(n => n.id === id);
    if (!note) return;
    trash = trash.filter(n => n.id !== id);
    const { trashedAt, ...restored } = note;
    notes.push(restored);
    saveNotes();
    render();
    renderTrash();
  }

  function permanentDelete(id) {
    trash = trash.filter(n => n.id !== id);
    saveNotes();
    renderTrash();
    updateTrashBadge();
  }

  function openTrash() {
    renderTrash();
    document.getElementById("trashDrawer").classList.add("open");
    document.getElementById("trashBackdrop").classList.add("open");
    document.body.style.overflow = "hidden";
  }

  function closeTrash() {

  // --- 面板拖拽调节 ---
  const resizeHandle = document.getElementById("resizeHandle");
  const paneLeft = document.getElementById("paneLeft");
  const paneRight = document.getElementById("paneRight");
  const mainEl = document.querySelector("main");

  let isResizing = false;
  let resizeStartX = 0;
  let resizeStartLeftWidth = 0;
  let resizeStartRightWidth = 0;

  resizeHandle.addEventListener("mousedown", (e) => {
    e.preventDefault();
    isResizing = true;
    resizeStartX = e.clientX;
    resizeStartLeftWidth = paneLeft.offsetWidth;
    resizeStartRightWidth = paneRight.offsetWidth;
    resizeHandle.classList.add("dragging");
    document.body.style.cursor = "col-resize";
    document.body.style.userSelect = "none";
  });

  document.addEventListener("mousemove", (e) => {
    if (!isResizing) return;
    const dx = e.clientX - resizeStartX;
    // 与 CSS min-width 保持一致，防止 h2 标题行换行
    const minLeft  = 310;
    const minRight = 250;
    const totalWidth = resizeStartLeftWidth + resizeStartRightWidth;
    const maxLeft = totalWidth - minRight;
    let newLeft  = Math.max(minLeft, Math.min(maxLeft, resizeStartLeftWidth + dx));
    let newRight = totalWidth - newLeft;
    paneLeft.style.flex  = "none";
    paneRight.style.flex = "none";
    paneLeft.style.width  = newLeft  + "px";
    paneRight.style.width = newRight + "px";
  });

  document.addEventListener("mouseup", () => {
    if (!isResizing) return;
    isResizing = false;
    resizeHandle.classList.remove("dragging");
    document.body.style.cursor = "";
    document.body.style.userSelect = "";
  });

  // --- 初始化 ---
  async function init() {
    dateInput.value = getTodayStr();

    window.addEventListener("online",  () => setSyncBadge("online"));
    window.addEventListener("offline", () => setSyncBadge("offline"));

    // 登录：优先用户名密码，失败则降级匿名登录（使用 2.24+ signInWithPassword / signInAnonymously）
    try {
      console.log("[Auth] 开始获取会话...");
      const { data: sessionData } = await tcbAuth.getSession();
      console.log("[Auth] getSession 返回：", JSON.stringify(sessionData ?? null));
      if (!sessionData?.session) {
        console.log("[Auth] 无会话，尝试用户名密码登录...");
        const { error: pwdErr } = await tcbAuth.signInWithPassword({
          username: "default",
          password: "Default1234"
        });
        if (pwdErr) {
          console.warn("[Auth] 用户名密码登录失败，原因：", pwdErr?.code, pwdErr?.message, pwdErr);
          console.log("[Auth] 降级尝试匿名登录...");
          const { error: anonErr } = await tcbAuth.signInAnonymously();
          if (anonErr) {
            console.error("[Auth] 匿名登录也失败，原因：", anonErr?.code, anonErr?.message, anonErr);
            throw anonErr;
          }
          console.log("[Auth] 匿名登录成功");
        } else {
          console.log("[Auth] 登录成功 username: default");
        }
      } else {
        const u = sessionData.session.user;
        const display = u?.user_metadata?.username || u?.user_metadata?.nickName || u?.email || u?.phone || u?.id || "anonymous";
        console.log("[Auth] 已有会话，当前用户：", display);
      }
    } catch (e) {
      console.error("[Auth] TCB 登录异常，使用本地模式。错误类型:", e?.name, "| 错误码:", e?.code, "| 消息:", e?.message);
      console.error("[Auth] 完整错误对象：", e);
      loadNotesFromLocal();
      setSyncBadge("offline");
      render();
      return;
    }

    // 上次同步失败时，先加载本地数据以便后续合并；否则直接用云端数据覆盖
    const lastSyncFailed = localStorage.getItem(SYNC_FAIL_KEY) === "1";
    if (lastSyncFailed) {
      loadNotesFromLocal();
      console.log(`[Storage] 上次同步失败，已加载本地备份（${notes.length} 条），将与云端合并`);
    }

    // 优先使用上次上传时 SDK 返回并持久化的真实 fileID，否则用硬编码的兜底值
    const savedFileId = localStorage.getItem(FILE_ID_KEY) || CLOUD_FILE_ID_DEFAULT;
    console.log("[Storage] 使用 fileID:", savedFileId,
      localStorage.getItem(FILE_ID_KEY) ? "(来自缓存)" : "(来自默认值)");

    try {
      console.log("[Storage] 调用 getTempFileURL...");
      const res = await tcbApp.getTempFileURL({ fileList: [savedFileId] });
      const item = res.fileList[0];
      console.log("[Storage] getTempFileURL 返回：", JSON.stringify(item));
      if (item.code === "SUCCESS" && item.tempFileURL) {
        localStorage.setItem(FILE_ID_KEY, savedFileId);
        const freshUrl = item.tempFileURL + (item.tempFileURL.includes("?") ? "&" : "?") + "_t=" + Date.now();
        console.log("[Storage] fetch 云端文件...", freshUrl.split("?")[0]);
        const resp = await fetch(freshUrl, { cache: "no-store" });
        console.log("[Storage] fetch 响应状态：", resp.status, resp.statusText);
        if (resp.ok) {
          const data = await resp.json();
          const cloudNotes = Array.isArray(data) ? data : (Array.isArray(data.notes) ? data.notes : []);
          const cloudTags  = Array.isArray(data) ? [] : (Array.isArray(data.tags)  ? data.tags  : []);
          const cloudTrash = Array.isArray(data.trash) ? data.trash : [];
          console.log(`[Storage] 云端读取成功：${cloudNotes.length} 条，标签 ${cloudTags.length}，回收站 ${cloudTrash.length}`);

          if (lastSyncFailed) {
            // 上次同步失败：合并本地未上传的改动与云端数据
            const localNotes = notes.slice();
            const localTrash = trash.slice();
            const localTags  = new Set(tagList);
            notes   = mergeNotes(cloudNotes, localNotes);
            trash   = mergeNotes(cloudTrash, localTrash);
            tagList = new Set([...cloudTags, ...localTags]);
            for (const n of notes) for (const t of (n.tags || [])) tagList.add(t);
            console.log(`[Storage] 合并完成：${notes.length} 条（本地 ${localNotes.length} + 云端 ${cloudNotes.length}）`);
            // 将合并结果写回云端，并清除失败标记
            try {
              const blob = new Blob([serializeData()], { type: "application/json" });
              const file = new File([blob], "notebook.json", { type: "application/json" });
              const uploadRes = await tcbApp.uploadFile({ cloudPath: CLOUD_PATH, filePath: file });
              if (uploadRes?.fileID) localStorage.setItem(FILE_ID_KEY, uploadRes.fileID);
              localStorage.removeItem(SYNC_FAIL_KEY);
              console.log("[Storage] 合并结果已回写云端");
            } catch (e) { console.warn("[Storage] 合并后回写云端失败，保留失败标记：", e); }
          } else {
            // 正常情况：直接用云端数据覆盖本地
            notes   = cloudNotes;
            trash   = cloudTrash;
            tagList = new Set(cloudTags);
            for (const n of notes) for (const t of (n.tags || [])) tagList.add(t);
            console.log("[Storage] 已用云端数据覆盖本地");
          }
          localStorage.setItem(STORAGE_KEY, serializeData());
          setSyncBadge("online");
        } else {
          let respBody = "";
          try { respBody = await resp.text(); } catch(_) {}
          console.warn("[Storage] 云端文件请求失败，HTTP:", resp.status, resp.statusText, "| 响应体:", respBody.slice(0, 300));
          if (!lastSyncFailed) loadNotesFromLocal();
          setSyncBadge("offline");
        }
      } else if (item.code === "STORAGE_FILE_NONEXIST") {
        console.log("[Storage] 云端文件不存在，使用本地数据");
        if (!lastSyncFailed) loadNotesFromLocal();
        setSyncBadge("offline");
      } else {
        console.warn("[Storage] 获取临时链接失败，完整返回：", JSON.stringify(item));
        if (!lastSyncFailed) loadNotesFromLocal();
        setSyncBadge("offline");
      }
    } catch (err) {
      console.error("[Storage] 云存储读取异常。错误类型:", err?.name, "| 错误码:", err?.code, "| 消息:", err?.message);
      console.error("[Storage] 完整错误对象：", err);
      if (!lastSyncFailed) loadNotesFromLocal();
      setSyncBadge("offline");
    }
    render();
  }

  // ── 渲染更新日志 ──────────────────────────────────────────────────
  function renderChangelog() {
    const body = document.getElementById("changelogBody");
    body.innerHTML = "";
    CHANGELOG.forEach((entry, idx) => {
      const isLast = idx === CHANGELOG.length - 1;
      const dotClass = entry.type === "fix" ? "cl-dot fix"
        : entry.type === "infra" ? "cl-dot init"
        : "cl-dot";
      const tagHtml = `<span class="cl-tag ${entry.type}">${
        entry.type === "feat" ? "新功能" : entry.type === "fix" ? "修复" : "基础设施"
      }</span>`;

      const el = document.createElement("div");
      el.className = "cl-entry";
      el.innerHTML = `
        <div class="cl-line">
          <div class="${dotClass}"></div>
          ${isLast ? "" : '<div class="cl-connector"></div>'}
        </div>
        <div class="cl-content">
          <div class="cl-version-row">
            <span class="cl-version">${entry.version}</span>
            <span class="cl-date">${entry.date}</span>
            ${tagHtml}
          </div>
          <div class="cl-desc">${entry.desc}</div>
          <ul class="cl-items">
            ${entry.items.map(i => `<li>${i}</li>`).join("")}
          </ul>
        </div>`;
      body.appendChild(el);
    });
  }

  // ── 抽屉开关 ──────────────────────────────────────────────────────
  function openChangelog() {
    renderChangelog();
    document.getElementById("changelogDrawer").classList.add("open");
    document.getElementById("changelogBackdrop").classList.add("open");
    document.body.style.overflow = "hidden";
  }
  function closeChangelog() {
    document.getElementById("changelogDrawer").classList.remove("open");
    document.getElementById("changelogBackdrop").classList.remove("open");
    document.body.style.overflow = "";
  }

  document.getElementById("changelogBtn").addEventListener("click", openChangelog);
  document.getElementById("changelogClose").addEventListener("click", closeChangelog);
  document.getElementById("changelogBackdrop").addEventListener("click", closeChangelog);
  document.addEventListener("keydown", e => {
    if (e.key === "Escape") { closeChangelog(); closeTrash(); }
  });

  init();
</script>
